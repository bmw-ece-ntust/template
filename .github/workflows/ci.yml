name: Build, Push & Health Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Defaults; jobs inherit these automatically.
env:
  HARBOR_REGISTRY: 192.168.8.84
  HARBOR_PROJECT: bmw-ece-ntust
  IMAGE_NAME: template

jobs:
  tests:
    name: Unit tests
    runs-on: [self-hosted]
    
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install optional dependencies
        run: |
          if [[ -f requirements.txt ]]; then
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt
          fi
      - name: Execute test suite
        run: |
          if compgen -G "tests/test_*.py" > /dev/null; then
            python -m unittest discover -s tests -p 'test_*.py'
          else
            echo "No tests discovered; running syntax check"
            python -m compileall src
          fi

  build-push:
    environment: ci
    name: Build & push image
    runs-on: [self-hosted]
    needs: tests
    env:
      TAG: ${{ github.sha }}
      HARBOR_USER: ${{ secrets.HARBOR_USER }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
    steps:
      - name: Debug Harbor env
        run: |
          echo "HARBOR_USER=${HARBOR_USER:-<unset>}"
          echo "HARBOR_PASSWORD length=${#HARBOR_PASSWORD}"
      - uses: actions/checkout@v4
      - name: Ensure scripts are executable
        run: chmod +x scripts/*.sh
      - name: Build and push via helper script
        run: ./scripts/image-build-push.sh --context .

  health-check:
    name: Post-deploy health check
    runs-on: [self-hosted]
    needs: build-push
    env:
      HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
      HEALTHCHECK_TIMEOUT: ${{ secrets.HEALTHCHECK_TIMEOUT }}
      HEALTHCHECK_ATTEMPTS: ${{ secrets.HEALTHCHECK_ATTEMPTS }}
      HEALTHCHECK_SLEEP: ${{ secrets.HEALTHCHECK_SLEEP }}
    steps:
      - name: Skip when no health check URL
        if: ${{ env.HEALTHCHECK_URL == '' }}
        run: echo "HEALTHCHECK_URL not set; skipping health check."
      - uses: actions/checkout@v4
        if: ${{ env.HEALTHCHECK_URL != '' }}
      - name: Run health check script
        if: ${{ env.HEALTHCHECK_URL != '' }}
        run: ./scripts/health_check.sh