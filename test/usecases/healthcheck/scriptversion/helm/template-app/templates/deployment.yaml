apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "template-app.fullname" . }}
  labels:
    {{- include "template-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "template-app.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "template-app.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      containers:
        - name: {{ include "template-app.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: RAPP_SERVICE_NAME
              value: {{ .Values.env.RAPP_SERVICE_NAME | quote }}
            - name: RAPP_PORT
              value: {{ .Values.env.RAPP_PORT | quote }}
            - name: SERVICE_NAME
              value: {{ .Values.env.RAPP_SERVICE_NAME | quote }}
            - name: PORT
              value: {{ .Values.env.RAPP_PORT | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
